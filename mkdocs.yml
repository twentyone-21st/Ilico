site_name: Ilico — Documentación
site_description: Filtro inteligente de correo con NLP y Machine Learning
site_author: Sterling Florian Capellan
docs_dir: docs
site_dir: site

theme:
  name: material
  language: es
  palette:
    scheme: slate
    primary: indigo
    accent: teal
  font:
    text: Manrope
    code: DM Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search:
      lang: es
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            heading_level: 3
  - minify:
      minify_html: true

nav:
  - Inicio: index.md
  - Instalación: instalacion.md
  - Arquitectura: arquitectura.md
  - API REST: api.md
  - Frontend: frontend.md
  - Modelo NLP: modelo.md
  - Referencia: referencia.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true
